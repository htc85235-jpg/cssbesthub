<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Private Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:#1a1d27;border-radius:16px;padding:40px 32px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.login-box h1{font-size:20px;margin-bottom:8px;text-align:center;}
.login-box p{font-size:12px;color:#64748b;text-align:center;margin-bottom:24px;}
.login-box input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid #2d3348;background:#12141c;color:#e2e8f0;font-size:14px;outline:none;margin-bottom:16px;}
.login-box input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
.login-box button{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:transform 0.1s,box-shadow 0.2s;}
.login-box button:active{transform:scale(0.97);}
.login-error{color:#f87171;font-size:12px;text-align:center;margin-top:12px;display:none;}

/* Dashboard */
.dash-wrap{display:none;padding:16px;max-width:640px;margin:0 auto;}
.dash-wrap.active{display:block;}

/* Header */
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #1e2233;}
.dash-header h1{font-size:18px;display:flex;align-items:center;gap:8px;}
.dash-header h1 span{font-size:22px;}
.logout-btn{background:none;border:1px solid #334155;color:#94a3b8;padding:6px 14px;border-radius:8px;font-size:11px;cursor:pointer;transition:all 0.15s;}
.logout-btn:hover{border-color:#f87171;color:#f87171;}

/* Write Count Card */
.wc-card{background:linear-gradient(145deg,#1a1f2e,#151923);border-radius:14px;padding:20px;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,0.3);border:1px solid #1e2538;}
.wc-card .wc-title{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.wc-card .wc-numbers{display:flex;align-items:baseline;gap:6px;margin-bottom:14px;}
.wc-card .wc-used{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;color:#fde68a;text-shadow:0 0 12px rgba(253,230,138,0.3);}
.wc-card .wc-sep{font-size:18px;color:#475569;font-weight:300;}
.wc-card .wc-limit{font-size:18px;color:#64748b;font-weight:600;}
.wc-card .wc-bar-track{width:100%;height:6px;background:#1e2233;border-radius:3px;overflow:hidden;}
.wc-card .wc-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease,background 0.3s;background:linear-gradient(90deg,#22c55e,#84cc16);}
.wc-card .wc-bar-fill.warn{background:linear-gradient(90deg,#f59e0b,#f97316);}
.wc-card .wc-bar-fill.danger{background:linear-gradient(90deg,#ef4444,#dc2626);}
.wc-card .wc-remaining{font-size:11px;color:#475569;margin-top:8px;}
.wc-card .wc-source{font-size:9px;color:#334155;margin-top:4px;}
.wc-refresh-btn{background:none;border:1px solid #334155;color:#64748b;padding:4px 10px;border-radius:6px;font-size:10px;cursor:pointer;margin-top:8px;transition:all 0.15s;}
.wc-refresh-btn:hover{border-color:#6366f1;color:#a5b4fc;}

/* Section */
.section{margin-bottom:24px;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.section-head h2{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;}
.section-head .badge{background:#6366f1;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.section-head .section-btns{display:flex;gap:6px;}
.delete-all-btn{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:transform 0.1s,opacity 0.15s;}
.delete-all-btn:active{transform:scale(0.96);}
.delete-all-btn:disabled{opacity:0.4;cursor:not-allowed;}
.delete-all-btn.purple{background:linear-gradient(135deg,#7c3aed,#6d28d9);}

/* Voice Message Card */
.vmsg-card{background:#14171f;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1px solid #1e2233;transition:all 0.2s;}
.vmsg-card:hover{border-color:#2d3348;}
.vmsg-card .vmsg-icon{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1e3a2f,#162b22);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.vmsg-card .vmsg-info{flex:1;min-width:0;}
.vmsg-card .vmsg-sender{font-size:12px;font-weight:600;color:#a5b4fc;text-transform:capitalize;}
.vmsg-card .vmsg-meta{font-size:10px;color:#475569;margin-top:2px;display:flex;gap:8px;}
.vmsg-card .vmsg-dur{color:#6ee7b7;}
.vmsg-card .vmsg-time{color:#475569;}
.vmsg-card .vmsg-size{color:#475569;}
.vmsg-delete{background:none;border:1px solid #3b1520;color:#f87171;width:30px;height:30px;border-radius:8px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.vmsg-delete:hover{background:#3b1520;border-color:#f87171;}
.vmsg-delete:active{transform:scale(0.9);}
.vmsg-delete.confirming{background:#dc2626;border-color:#dc2626;color:#fff;font-size:9px;font-weight:700;}

/* Text Messages Section */
.txt-section-empty{background:#14171f;border-radius:10px;padding:20px;text-align:center;color:#475569;font-size:12px;border:1px solid #1e2233;}

/* Status / Loading */
.loading{text-align:center;padding:40px;color:#475569;font-size:12px;}
.spinner{width:24px;height:24px;border:3px solid #1e2233;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#e2e8f0;padding:10px 20px;border-radius:10px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:transform 0.3s ease;z-index:999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border:1px solid #22c55e33;}
.toast.error{border:1px solid #ef444433;}

/* Confirm overlay */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:998;padding:20px;}
.confirm-box{background:#1a1d27;border-radius:14px;padding:24px;max-width:320px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.confirm-box h3{font-size:15px;margin-bottom:8px;}
.confirm-box p{font-size:12px;color:#94a3b8;margin-bottom:20px;line-height:1.5;}
.confirm-box .confirm-btns{display:flex;gap:10px;justify-content:flex-end;}
.confirm-box .btn-cancel{background:#2d3348;color:#94a3b8;border:none;padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;}
.confirm-box .btn-confirm{background:#dc2626;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}

/* Progress bar for bulk ops */
.bulk-progress{width:100%;height:4px;background:#1e2233;border-radius:2px;margin-top:12px;overflow:hidden;display:none;}
.bulk-progress.active{display:block;}
.bulk-progress .bulk-bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:2px;transition:width 0.3s;width:0%;}
.bulk-status{font-size:10px;color:#64748b;margin-top:6px;display:none;}
.bulk-status.active{display:block;}

/* Responsive */
@media(max-width:480px){
  .dash-wrap{padding:12px;}
  .wc-card .wc-used{font-size:28px;}
  .vmsg-card{padding:10px 12px;}
  .section-head .section-btns{flex-wrap:wrap;}
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <h1>Private Dashboard</h1>
    <p>Enter password to access</p>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="off"/>
    <button id="pw-btn">Unlock</button>
    <div class="login-error" id="login-error">Wrong password</div>
  </div>
</div>

<!-- Dashboard -->
<div class="dash-wrap" id="dash-wrap">
  <div class="dash-header">
    <h1><span>&#128274;</span> Dashboard</h1>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </div>

  <!-- Write Count -->
  <div class="wc-card" id="wc-card">
    <div class="wc-title">KV Writes Used Today</div>
    <div class="wc-numbers">
      <span class="wc-used" id="wc-used">--</span>
      <span class="wc-sep">/</span>
      <span class="wc-limit">1,000</span>
    </div>
    <div class="wc-bar-track"><div class="wc-bar-fill" id="wc-bar" style="width:0%"></div></div>
    <div class="wc-remaining" id="wc-remaining">Loading...</div>
    <div class="wc-source" id="wc-source"></div>
    <button class="wc-refresh-btn" id="wc-refresh">Refresh</button>
  </div>

  <!-- Voice Messages -->
  <div class="section" id="voice-section">
    <div class="section-head">
      <h2>&#127908; Voice Messages <span class="badge" id="voice-count">0</span></h2>
      <div class="section-btns">
        <button class="delete-all-btn purple" id="delete-all-voice-btn">Delete All Voice</button>
      </div>
    </div>
    <div id="voice-list"><div class="loading"><div class="spinner"></div>Loading voice messages...</div></div>
    <div class="bulk-progress" id="voice-bulk-progress"><div class="bulk-bar" id="voice-bulk-bar"></div></div>
    <div class="bulk-status" id="voice-bulk-status"></div>
  </div>

  <!-- Text Messages -->
  <div class="section" id="text-section">
    <div class="section-head">
      <h2>&#128172; Text Messages <span class="badge" id="text-count">0</span></h2>
      <div class="section-btns">
        <button class="delete-all-btn" id="delete-all-text-btn">Delete All Text</button>
      </div>
    </div>
    <div id="text-list"><div class="loading"><div class="spinner"></div>Loading text messages...</div></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>
<!-- Confirm overlay -->
<div class="confirm-overlay" id="confirm-overlay" style="display:none;"></div>

<script>
(function(){
  // ===== CONFIG =====
  // Password obfuscated — split into char codes, reconstructed at runtime only
  var _pc = [64,83,108,111,119,68,117,109,98,111,55,56,54];
  function _rp(){ return String.fromCharCode.apply(null, _pc); }

  // Worker auth password (same as chat login)
  var _wc = [115,108,111,119,100,117,109,98,111];
  function _rwc(){ return String.fromCharCode.apply(null, _wc); }

  var ENCRYPT_PASSWORD = _rp();
  var CHAT_PASSWORD = _rwc();
  var WORKER_URL = 'https://voice-box-worker.htc85235.workers.dev';
  var GITHUB_REPO = 'htc85235-jpg/cssbesthub-vault';
  var GITHUB_BRANCH = 'main';
  var CHAT_FILE = 'chat.json';
  var AUTO_DELETE_MS = 24 * 60 * 60 * 1000;

  var _tk = ['github_pat_','11CIFWJEI0mHffC6IONYQ0_','DMNNFYPSHIw6xh2h7mq1L','CRK6tm2dTnwTOtfRrjl1NZYRNO7M4ZqphnSRMw'];
  function _gt(){ return _tk.join(''); }

  // ===== STATE =====
  var isLoggedIn = false;
  var ownerToken = '';
  var maxWritesEver = parseInt(localStorage.getItem('dash_maxWrites') || '0');
  var chatFileSha = null;
  var voiceMessages = [];
  var textMessages = [];

  // ===== DOM =====
  var loginWrap = document.getElementById('login-wrap');
  var dashWrap = document.getElementById('dash-wrap');
  var pwInput = document.getElementById('pw-input');
  var pwBtn = document.getElementById('pw-btn');
  var loginError = document.getElementById('login-error');
  var logoutBtn = document.getElementById('logout-btn');
  var wcUsed = document.getElementById('wc-used');
  var wcBar = document.getElementById('wc-bar');
  var wcRemaining = document.getElementById('wc-remaining');
  var wcSource = document.getElementById('wc-source');
  var wcRefresh = document.getElementById('wc-refresh');
  var voiceList = document.getElementById('voice-list');
  var voiceCountBadge = document.getElementById('voice-count');
  var deleteAllVoiceBtn = document.getElementById('delete-all-voice-btn');
  var voiceBulkProgress = document.getElementById('voice-bulk-progress');
  var voiceBulkBar = document.getElementById('voice-bulk-bar');
  var voiceBulkStatus = document.getElementById('voice-bulk-status');
  var textList = document.getElementById('text-list');
  var textCountBadge = document.getElementById('text-count');
  var deleteAllTextBtn = document.getElementById('delete-all-text-btn');
  var toastEl = document.getElementById('toast');
  var confirmOverlay = document.getElementById('confirm-overlay');

  // ===== LOGIN =====
  pwBtn.addEventListener('click', doLogin);
  pwInput.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

  function doLogin(){
    if(pwInput.value === _rp()){
      isLoggedIn = true;
      ownerToken = btoa('owner:' + CHAT_PASSWORD);
      loginWrap.style.display = 'none';
      dashWrap.classList.add('active');
      loadDashboard();
      // Clear password from input immediately
      pwInput.value = '';
    } else {
      loginError.style.display = 'block';
      pwInput.value = '';
      setTimeout(function(){ loginError.style.display = 'none'; }, 3000);
    }
  }

  logoutBtn.addEventListener('click', function(){
    isLoggedIn = false;
    ownerToken = '';
    dashWrap.classList.remove('active');
    loginWrap.style.display = 'flex';
    pwInput.value = '';
  });

  // ===== LOAD ALL =====
  async function loadDashboard(){
    fetchWriteCount();
    loadVoiceMessages();
    loadTextMessages();
  }

  // ===== WRITE COUNT (NEVER DECREASES) =====
  var writeCountTimer = null;

  async function fetchWriteCount(){
    try {
      var resp = await fetch(WORKER_URL + '/kv-stats');
      if(!resp.ok) throw new Error('API error');
      var data = await resp.json();

      if(data.writes !== undefined && data.writes !== null){
        var writes = data.writes;
        // NEVER decrease — only track upward
        if(writes > maxWritesEver){
          maxWritesEver = writes;
          localStorage.setItem('dash_maxWrites', String(maxWritesEver));
        }
        displayWriteCount(maxWritesEver, data.source, data.date);
      } else {
        if(maxWritesEver > 0){
          displayWriteCount(maxWritesEver, 'cached-max', '');
        } else {
          wcUsed.textContent = '--';
          wcRemaining.textContent = 'Write count unavailable';
          wcSource.textContent = data.note || 'API returned no data';
        }
      }
    } catch(e){
      if(maxWritesEver > 0){
        displayWriteCount(maxWritesEver, 'cached-max', '');
      } else {
        wcUsed.textContent = '--';
        wcRemaining.textContent = 'Failed to fetch write count';
      }
    }
  }

  function displayWriteCount(used, source, date){
    var remaining = Math.max(0, 1000 - used);
    var pct = Math.min(100, (used / 1000) * 100);

    wcUsed.textContent = used;
    wcBar.style.width = pct + '%';
    wcRemaining.textContent = remaining + ' writes remaining today';

    if(pct > 95){
      wcBar.className = 'wc-bar-fill danger';
      wcUsed.style.color = '#fca5a5';
      wcUsed.style.textShadow = '0 0 12px rgba(252,165,165,0.4)';
    } else if(pct > 80){
      wcBar.className = 'wc-bar-fill warn';
      wcUsed.style.color = '#fdba74';
      wcUsed.style.textShadow = '0 0 12px rgba(253,186,116,0.3)';
    } else {
      wcBar.className = 'wc-bar-fill';
      wcUsed.style.color = '#fde68a';
      wcUsed.style.textShadow = '0 0 12px rgba(253,230,138,0.3)';
    }

    var sourceLabel = source === 'cloudflare-graphql' ? 'Live from Cloudflare' :
                      source === 'cached-max' ? 'Cached (max ever seen)' :
                      source === 'cloudflare-api-error' ? 'API error — showing max' :
                      source || '';
    wcSource.textContent = sourceLabel + (date ? ' | Date: ' + date : '');
  }

  wcRefresh.addEventListener('click', function(){
    wcRefresh.textContent = 'Refreshing...';
    wcRefresh.disabled = true;
    fetchWriteCount().then(function(){
      wcRefresh.textContent = 'Refresh';
      wcRefresh.disabled = false;
    });
  });

  // Auto-refresh write count every 30 seconds
  writeCountTimer = setInterval(fetchWriteCount, 30000);

  // ===== VOICE MESSAGES =====
  async function loadVoiceMessages(){
    voiceList.innerHTML = '<div class="loading"><div class="spinner"></div>Loading voice messages...</div>';
    try {
      var resp = await fetch(WORKER_URL + '/messages', {
        headers: { 'X-Owner-Token': ownerToken }
      });
      if(!resp.ok) throw new Error('Auth failed');
      var data = await resp.json();
      voiceMessages = data.messages || [];
      voiceCountBadge.textContent = voiceMessages.length;
      deleteAllVoiceBtn.disabled = voiceMessages.length === 0;
      renderVoiceMessages();
    } catch(e){
      voiceList.innerHTML = '<div class="txt-section-empty">Failed to load voice messages. Check auth.</div>';
    }
  }

  function renderVoiceMessages(){
    if(voiceMessages.length === 0){
      voiceList.innerHTML = '<div class="txt-section-empty">No voice messages</div>';
      deleteAllVoiceBtn.disabled = true;
      return;
    }
    deleteAllVoiceBtn.disabled = false;
    var html = '';
    voiceMessages.forEach(function(msg, i){
      var dur = msg.duration || '0:00';
      var sizeStr = msg.size ? Math.round(msg.size / 1024) + ' KB' : '';
      var timeStr = msg.isoDate ? formatTime(msg.isoDate) : '';
      var sender = msg.sender || 'unknown';
      html += '<div class="vmsg-card" data-voice-key="' + escapeAttr(msg.key) + '" data-index="' + i + '">'
        + '<div class="vmsg-icon">&#127908;</div>'
        + '<div class="vmsg-info">'
        + '<div class="vmsg-sender">' + escapeHtml(sender) + '</div>'
        + '<div class="vmsg-meta">'
        + '<span class="vmsg-dur">' + escapeHtml(dur) + '</span>'
        + (sizeStr ? '<span class="vmsg-size">' + sizeStr + '</span>' : '')
        + (timeStr ? '<span class="vmsg-time">' + timeStr + '</span>' : '')
        + '</div></div>'
        + '<button class="vmsg-delete" title="Delete" data-key="' + escapeAttr(msg.key) + '">&#128465;</button>'
        + '</div>';
    });
    voiceList.innerHTML = html;

    // Attach delete handlers with confirm-on-double-click
    voiceList.querySelectorAll('.vmsg-delete').forEach(function(btn){
      var confirmTimeout = null;
      btn.addEventListener('click', function(){
        if(btn.classList.contains('confirming')){
          clearTimeout(confirmTimeout);
          btn.classList.remove('confirming');
          btn.innerHTML = '&#128465;';
          deleteVoiceMessage(btn.dataset.key);
        } else {
          btn.classList.add('confirming');
          btn.innerHTML = 'Sure?';
          confirmTimeout = setTimeout(function(){
            btn.classList.remove('confirming');
            btn.innerHTML = '&#128465;';
          }, 3000);
        }
      });
    });
  }

  async function deleteVoiceMessage(key){
    var card = voiceList.querySelector('[data-voice-key="' + CSS.escape(key) + '"]');
    if(card){
      card.style.opacity = '0.4';
      card.style.pointerEvents = 'none';
    }
    try {
      var resp = await fetch(WORKER_URL + '/message/' + key, {
        method: 'DELETE',
        headers: { 'X-Owner-Token': ownerToken }
      });
      if(!resp.ok) throw new Error('Delete failed');
      var data = await resp.json();
      if(data.success){
        showToast('Voice message deleted', 'success');
        voiceMessages = voiceMessages.filter(function(m){ return m.key !== key; });
        voiceCountBadge.textContent = voiceMessages.length;
        deleteAllVoiceBtn.disabled = voiceMessages.length === 0;
        if(card){
          card.style.transition = 'all 0.3s';
          card.style.opacity = '0';
          card.style.maxHeight = '0';
          card.style.padding = '0';
          card.style.margin = '0';
          card.style.overflow = 'hidden';
          setTimeout(function(){ card.remove(); if(voiceMessages.length===0) renderVoiceMessages(); }, 300);
        }
        fetchWriteCount();
      } else {
        throw new Error(data.error || 'Unknown error');
      }
    } catch(e){
      showToast('Delete failed: ' + e.message, 'error');
      if(card){ card.style.opacity = '1'; card.style.pointerEvents = 'auto'; }
    }
  }

  // ===== DELETE ALL VOICE MESSAGES =====
  deleteAllVoiceBtn.addEventListener('click', function(){
    if(voiceMessages.length === 0) return;
    var estWrites = voiceMessages.length * 3 + 1; // 3 deletes per msg + 1 index write
    showConfirm(
      'Delete All Voice Messages',
      'Bulk delete ' + voiceMessages.length + ' voice messages. Uses ~' + estWrites + ' KV writes (saves ~' + voiceMessages.length + ' writes vs individual delete). Text messages will NOT be affected. This cannot be undone.',
      function(){ doDeleteAllVoice(); }
    );
  });

  async function doDeleteAllVoice(){
    var total = voiceMessages.length;
    if(total === 0) return;

    deleteAllVoiceBtn.disabled = true;
    deleteAllVoiceBtn.textContent = 'Deleting...';
    voiceBulkProgress.classList.add('active');
    voiceBulkStatus.classList.add('active');
    voiceBulkBar.style.width = '10%';
    voiceBulkStatus.textContent = 'Sending bulk delete request...';

    try {
      var resp = await fetch(WORKER_URL + '/messages-all', {
        method: 'DELETE',
        headers: { 'X-Owner-Token': ownerToken }
      });
      if(!resp.ok) throw new Error('Bulk delete failed: ' + resp.status);
      var data = await resp.json();

      voiceBulkBar.style.width = '100%';
      var savedInfo = data.writesSaved ? ' (saved ~' + data.writesSaved + ' writes)' : '';
      voiceBulkStatus.textContent = 'Done. Deleted: ' + data.deleted + savedInfo + (data.failed > 0 ? ', Failed: ' + data.failed : '');

      voiceMessages = [];
      voiceCountBadge.textContent = '0';
      renderVoiceMessages();

      deleteAllVoiceBtn.textContent = 'Delete All Voice';
      deleteAllVoiceBtn.disabled = true;

      showToast('All ' + data.deleted + ' voice messages deleted' + savedInfo, 'success');
      fetchWriteCount();
    } catch(e){
      voiceBulkBar.style.width = '0%';
      voiceBulkStatus.textContent = 'Failed: ' + e.message;
      deleteAllVoiceBtn.textContent = 'Delete All Voice';
      deleteAllVoiceBtn.disabled = false;
      showToast('Bulk delete failed: ' + e.message, 'error');
    }

    // Hide progress after 5s
    setTimeout(function(){
      voiceBulkProgress.classList.remove('active');
      voiceBulkStatus.classList.remove('active');
      voiceBulkBar.style.width = '0%';
    }, 5000);
  }

  // ===== TEXT MESSAGES =====
  async function loadTextMessages(){
    textList.innerHTML = '<div class="loading"><div class="spinner"></div>Loading text messages...</div>';
    try {
      var data = await githubApi('GET', '/contents/' + CHAT_FILE + '?ref=' + GITHUB_BRANCH + '&t=' + Date.now());
      if(data.sha) chatFileSha = data.sha;
      if(data.content){
        var chatData = await parseChatContent(data.content);
        var now = Date.now();
        var allMsgs = (chatData.messages || []).filter(function(m){ return (now - m.ts) < AUTO_DELETE_MS; });
        textMessages = allMsgs.filter(function(m){ return m.type === 'text'; });
        textCountBadge.textContent = textMessages.length;
        renderTextMessages();
      } else {
        textMessages = [];
        textCountBadge.textContent = '0';
        renderTextMessages();
      }
    } catch(e){
      textList.innerHTML = '<div class="txt-section-empty">Failed to load text messages</div>';
    }
  }

  function renderTextMessages(){
    if(textMessages.length === 0){
      textList.innerHTML = '<div class="txt-section-empty">No text messages</div>';
      deleteAllTextBtn.disabled = true;
      return;
    }
    deleteAllTextBtn.disabled = false;
    var html = '';
    textMessages.forEach(function(msg){
      var sender = msg.sender || 'unknown';
      var text = msg.text || '';
      var timeStr = msg.ts ? formatTime(new Date(msg.ts).toISOString()) : '';
      var preview = text.length > 80 ? text.substring(0, 80) + '...' : text;
      html += '<div class="vmsg-card">'
        + '<div class="vmsg-icon" style="background:linear-gradient(135deg,#1e2a35,#162030);">&#128172;</div>'
        + '<div class="vmsg-info">'
        + '<div class="vmsg-sender">' + escapeHtml(sender) + '</div>'
        + '<div class="vmsg-meta">'
        + '<span style="color:#94a3b8;font-size:11px;">' + escapeHtml(preview) + '</span>'
        + '</div>'
        + (timeStr ? '<div class="vmsg-meta"><span class="vmsg-time">' + timeStr + '</span></div>' : '')
        + '</div></div>';
    });
    textList.innerHTML = html;
  }

  deleteAllTextBtn.addEventListener('click', function(){
    if(textMessages.length === 0) return;
    showConfirm('Delete All Text Messages', 'This will permanently delete all ' + textMessages.length + ' text messages. Voice messages will NOT be affected. This action cannot be undone.', function(){
      doDeleteAllText();
    });
  });

  async function doDeleteAllText(){
    deleteAllTextBtn.disabled = true;
    deleteAllTextBtn.textContent = 'Deleting...';
    try {
      var fresh = await githubApi('GET', '/contents/' + CHAT_FILE + '?ref=' + GITHUB_BRANCH + '&t=' + Date.now());
      if(fresh.sha) chatFileSha = fresh.sha;
      if(!fresh.content) throw new Error('No chat file');

      var chatData = await parseChatContent(fresh.content);
      var now = Date.now();
      var allMsgs = (chatData.messages || []).filter(function(m){ return (now - m.ts) < AUTO_DELETE_MS; });
      var remaining = allMsgs.filter(function(m){ return m.type !== 'text'; });

      var saved = await saveChatToGitHub(remaining);
      if(saved){
        showToast('All ' + textMessages.length + ' text messages deleted', 'success');
        textMessages = [];
        textCountBadge.textContent = '0';
        renderTextMessages();
      } else {
        throw new Error('Save failed');
      }
    } catch(e){
      showToast('Failed: ' + e.message, 'error');
      deleteAllTextBtn.disabled = false;
      deleteAllTextBtn.textContent = 'Delete All Text';
    }
  }

  // ===== GITHUB API =====
  function githubApi(method, path, body){
    var opts = {
      method: method,
      headers: {
        'Authorization': 'token ' + _gt(),
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      }
    };
    if(body) opts.body = JSON.stringify(body);
    return fetch('https://api.github.com/repos/' + GITHUB_REPO + path, opts)
      .then(function(r){ return r.json(); });
  }

  async function parseChatContent(b64Content){
    var jsonStr = atob(b64Content.replace(/\n/g, ''));
    var parsed = JSON.parse(jsonStr);
    if(parsed.ciphertext){
      var decrypted = await decryptText(parsed.ciphertext, _rp());
      return JSON.parse(decrypted);
    }
    return parsed;
  }

  async function saveChatToGitHub(messages){
    try {
      var fresh = await githubApi('GET', '/contents/' + CHAT_FILE + '?ref=' + GITHUB_BRANCH + '&t=' + Date.now());
      if(fresh.sha) chatFileSha = fresh.sha;
    } catch(e){}

    var now = new Date().toISOString();
    var payload = { messages: messages, updatedAt: now };
    var encrypted = await encryptText(JSON.stringify(payload), _rp());
    var b64 = btoa(JSON.stringify({ v: 1, ciphertext: encrypted, updatedAt: now }));
    var body = { message: 'Dashboard: delete messages ' + now, content: b64, branch: GITHUB_BRANCH };
    if(chatFileSha) body.sha = chatFileSha;

    var result = await githubApi('PUT', '/contents/' + CHAT_FILE, body);
    if(result.sha) chatFileSha = result.sha;
    if(result.content) chatFileSha = result.content.sha;

    // After any deletion, purge git history so deleted messages can't be recovered from old commits
    purgeGitHistory();

    return !!(result.sha || result.content);
  }

  // ===== PURGE GIT HISTORY =====
  // After deleting messages, old commits still contain them in git history.
  // This squashes all history into a single commit so deleted data is unrecoverable.
  var purgeInProgress = false;
  async function purgeGitHistory(){
    if(purgeInProgress) return; // prevent concurrent purges
    purgeInProgress = true;
    try {
      // Step 1: Get current HEAD commit
      var ref = await githubApi('GET', '/git/refs/heads/' + GITHUB_BRANCH);
      var headSha = ref.object && ref.object.sha;
      if(!headSha) { purgeInProgress = false; return; }

      // Step 2: Get the tree of current HEAD
      var commit = await githubApi('GET', '/git/commits/' + headSha);
      var treeSha = commit.tree && commit.tree.sha;
      if(!treeSha) { purgeInProgress = false; return; }

      // Step 3: Create a new orphan commit with same tree but no parent
      var newCommit = await githubApi('POST', '/git/commits', {
        message: 'History purged — deleted messages unrecoverable',
        tree: treeSha,
        parents: []  // No parent = orphan commit, history severed
      });

      if(!newCommit.sha) { purgeInProgress = false; return; }

      // Step 4: Force-update the branch to point to new orphan commit
      await githubApi('PATCH', '/git/refs/heads/' + GITHUB_BRANCH, {
        sha: newCommit.sha,
        force: true
      });
    } catch(e){
      // Silently fail — not critical if purge doesn't work every time
      console.log('History purge failed (non-critical):', e);
    }
    purgeInProgress = false;
  }

  // ===== ENCRYPTION =====
  async function deriveKey(password, salt){
    var enc = new TextEncoder();
    var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
    );
  }

  async function encryptText(text, password){
    var salt = crypto.getRandomValues(new Uint8Array(16));
    var iv = crypto.getRandomValues(new Uint8Array(12));
    var key = await deriveKey(password, salt);
    var plaintext = new TextEncoder().encode(text);
    var ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, plaintext);
    var combined = new Uint8Array(salt.length + iv.length + ciphertext.byteLength);
    combined.set(salt, 0);
    combined.set(iv, salt.length);
    combined.set(new Uint8Array(ciphertext), salt.length + iv.length);
    return btoa(String.fromCharCode.apply(null, combined));
  }

  async function decryptText(b64, password){
    var raw = Uint8Array.from(atob(b64), function(c){ return c.charCodeAt(0); });
    var salt = raw.slice(0, 16);
    var iv = raw.slice(16, 28);
    var ciphertext = raw.slice(28);
    var key = await deriveKey(password, salt);
    var plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext);
    return new TextDecoder().decode(plaintext);
  }

  // ===== HELPERS =====
  function formatTime(isoStr){
    try{
      var d = new Date(isoStr);
      var h = d.getHours(); var m = d.getMinutes();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
    } catch(e){ return isoStr; }
  }

  function escapeHtml(str){
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str){
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  var toastTimer = null;
  function showToast(msg, type){
    toastEl.textContent = msg;
    toastEl.className = 'toast ' + (type || '') + ' show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 3000);
  }

  function showConfirm(title, desc, onConfirm){
    confirmOverlay.style.display = 'flex';
    confirmOverlay.innerHTML = '<div class="confirm-box">'
      + '<h3>' + escapeHtml(title) + '</h3>'
      + '<p>' + escapeHtml(desc) + '</p>'
      + '<div class="confirm-btns">'
      + '<button class="btn-cancel" id="confirm-cancel">Cancel</button>'
      + '<button class="btn-confirm" id="confirm-ok">Delete</button>'
      + '</div></div>';
    document.getElementById('confirm-cancel').addEventListener('click', function(){
      confirmOverlay.style.display = 'none';
    });
    document.getElementById('confirm-ok').addEventListener('click', function(){
      confirmOverlay.style.display = 'none';
      onConfirm();
    });
  }

})();
</script>
