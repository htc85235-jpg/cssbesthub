<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Box — Private Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0f14; color: #c9d1e0; min-height: 100vh; }
  
  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
  
  h1 { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #a8b0c0; font-size: 14px; margin-bottom: 32px; }
  .subtitle span { color: #2e8b6a; }
  
  /* Login */
  .login-box { max-width: 400px; margin: 80px auto; background: #1a1d24; border-radius: 24px; padding: 36px 28px; box-shadow: 14px 14px 28px #0d0f14, -14px -14px 28px #2a2f3a; }
  .login-box h2 { font-size: 22px; text-align: center; margin-bottom: 24px; }
  .login-box input { width: 100%; background: #1a1d24; border: none; border-radius: 14px; padding: 14px 18px; color: #c9d1e0; font-size: 16px; outline: none; margin-bottom: 16px; letter-spacing: 2px; box-shadow: inset 4px 4px 8px #0d0f14, inset -4px -4px 8px #2a2f3a; }
  .login-box input:focus { color: #d4af37; }
  .login-box input::placeholder { color: #555c6e; letter-spacing: 4px; }
  .login-box button { width: 100%; background: #1a1d24; color: #c9d1e0; border: none; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 6px 6px 12px #0d0f14, -6px -6px 12px #2a2f3a; transition: all 0.15s; }
  .login-box button:hover { color: #d4af37; }
  .login-box button:active { box-shadow: inset 6px 6px 12px #0d0f14, inset -6px -6px 12px #2a2f3a; }
  .login-error { color: #e57373; font-size: 13px; text-align: center; margin-top: 10px; }
  
  /* Dashboard */
  .dashboard { display: none; }
  .dashboard.active { display: block; }
  
  .stats { display: flex; gap: 12px; margin-bottom: 24px; }
  .stat-card { flex: 1; background: #1a1d24; border-radius: 16px; padding: 16px; text-align: center; box-shadow: 6px 6px 12px #0d0f14, -6px -6px 12px #2a2f3a; }
  .stat-card .num { font-size: 28px; font-weight: 700; color: #d4af37; }
  .stat-card .label { font-size: 12px; color: #a8b0c0; margin-top: 4px; }
  
  .actions { display: flex; gap: 10px; margin-bottom: 24px; }
  .actions button { flex: 1; background: #1a1d24; color: #a8b0c0; border: none; border-radius: 12px; padding: 12px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 4px 4px 8px #0d0f14, -4px -4px 8px #2a2f3a; transition: all 0.15s; }
  .actions button:hover { color: #d4af37; }
  .actions button:active { box-shadow: inset 4px 4px 8px #0d0f14, inset -4px -4px 8px #2a2f3a; }
  .actions button.danger:hover { color: #e57373; }
  
  .msg-list { display: flex; flex-direction: column; gap: 10px; }
  .msg-item { background: #1a1d24; border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; box-shadow: 6px 6px 12px #0d0f14, -6px -6px 12px #2a2f3a; transition: all 0.15s; }
  .msg-item:hover { box-shadow: 8px 8px 16px #0d0f14, -8px -8px 16px #2a2f3a; }
  
  .msg-play { width: 44px; height: 44px; border-radius: 50%; background: #1a1d24; border: none; color: #2e8b6a; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 4px 4px 8px #0d0f14, -4px -4px 8px #2a2f3a; flex-shrink: 0; transition: all 0.15s; }
  .msg-play:hover { color: #3fbf8e; }
  .msg-play:active { box-shadow: inset 4px 4px 8px #0d0f14, inset -4px -4px 8px #2a2f3a; }
  .msg-play.playing { color: #d4af37; }
  
  .msg-info { flex: 1; min-width: 0; }
  .msg-sender { font-weight: 600; font-size: 15px; }
  .msg-meta { font-size: 12px; color: #a8b0c0; margin-top: 2px; }
  .msg-date { font-size: 11px; color: #555c6e; margin-top: 2px; }
  
  .msg-delete { width: 36px; height: 36px; border-radius: 50%; background: #1a1d24; border: none; color: #555c6e; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 3px 3px 6px #0d0f14, -3px -3px 6px #2a2f3a; flex-shrink: 0; transition: all 0.15s; }
  .msg-delete:hover { color: #e57373; }
  
  .empty-state { text-align: center; padding: 60px 20px; color: #555c6e; }
  .empty-state svg { margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }
  
  .loading { text-align: center; padding: 40px; color: #a8b0c0; }
  .spin { display: inline-block; width: 32px; height: 32px; border: 3px solid #1a1d24; border-top-color: #d4af37; border-radius: 50%; animation: vmspin 0.8s linear infinite; }
  @keyframes vmspin { to { transform: rotate(360deg); } }
  
  /* Audio player bar */
  .player-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #1a1d24; padding: 14px 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.4); z-index: 999; align-items: center; gap: 12px; }
  .player-bar.active { display: flex; }
  .player-bar audio { flex: 1; height: 36px; border-radius: 8px; }
  .player-bar button { background: none; border: none; color: #a8b0c0; cursor: pointer; font-size: 18px; padding: 4px; }
  .player-bar button:hover { color: #e57373; }
  
  .key-prompt { background: #1a1d24; border-radius: 16px; padding: 20px; margin-bottom: 24px; box-shadow: inset 4px 4px 8px #0d0f14, inset -4px -4px 8px #2a2f3a; }
  .key-prompt p { font-size: 13px; color: #a8b0c0; margin-bottom: 10px; }
  .key-prompt textarea { width: 100%; height: 80px; background: #0d0f14; border: none; border-radius: 10px; padding: 10px; color: #c9d1e0; font-family: monospace; font-size: 11px; resize: vertical; outline: none; }
  .key-prompt .key-actions { display: flex; gap: 8px; margin-top: 10px; }
  .key-prompt .key-actions button { flex: 1; padding: 10px; border-radius: 10px; border: none; background: #1a1d24; color: #a8b0c0; font-weight: 600; cursor: pointer; font-size: 13px; box-shadow: 4px 4px 8px #0d0f14, -4px -4px 8px #2a2f3a; }
  .key-prompt .key-actions button:hover { color: #d4af37; }
  .key-status { font-size: 12px; margin-top: 8px; }
  .key-status.ok { color: #2e8b6a; }
  .key-status.missing { color: #e57373; }
</style>
</head>
<body>

<!-- Login -->
<div id="login" class="login-box">
  <h2>Voice Box Dashboard</h2>
  <p style="text-align:center;color:#a8b0c0;font-size:13px;margin-bottom:20px;">Owner access only</p>
  <input id="pw" type="password" autocomplete="off" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"/>
  <button id="login-btn">Unlock</button>
  <p id="login-err" class="login-error" style="display:none;">Invalid password</p>
</div>

<!-- Dashboard -->
<div id="dash" class="dashboard">
  <div class="container">
    <h1>Voice Box</h1>
    <p class="subtitle"><span>&#128274;</span> End-to-end encrypted messages</p>
    
    <!-- Private key section -->
    <div id="key-section" class="key-prompt">
      <p>Paste your private key to decrypt messages. It stays in your browser only — never sent to any server.</p>
      <textarea id="privkey-input" placeholder="-----BEGIN PRIVATE KEY-----&#10;...&#10;-----END PRIVATE KEY-----"></textarea>
      <div class="key-actions">
        <button id="save-key-btn">Save Key</button>
        <button id="clear-key-btn">Clear Key</button>
      </div>
      <p id="key-status" class="key-status missing">No private key loaded</p>
    </div>
    
    <div class="stats">
      <div class="stat-card"><div class="num" id="total-count">—</div><div class="label">Messages</div></div>
      <div class="stat-card"><div class="num" id="today-count">—</div><div class="label">Today</div></div>
      <div class="stat-card"><div class="num" id="storage-used">—</div><div class="label">KB Used</div></div>
    </div>
    
    <div class="actions">
      <button id="refresh-btn">&#8635; Refresh</button>
      <button id="cleanup-btn">&#128465; Clean Old</button>
      <button id="logout-btn">&#9211; Logout</button>
    </div>
    
    <div id="msg-list" class="msg-list">
      <div class="loading"><div class="spin"></div><p style="margin-top:12px;">Loading messages...</p></div>
    </div>
  </div>
</div>

<!-- Audio player bar -->
<div id="player-bar" class="player-bar">
  <audio id="audio-player" controls></audio>
  <button id="close-player">&times;</button>
</div>

<script>
(function(){
  'use strict';
  
  var WORKER_URL = 'https://voice-box-worker.htc85235.workers.dev';
  var VAULT_PASSWORD = 'slowdumbo';
  var ownerToken = null;
  var privateKey = null;
  var messages = [];
  var currentAudioUrl = null;
  
  // DOM
  var loginBox = document.getElementById('login');
  var dashBox = document.getElementById('dash');
  var pwInput = document.getElementById('pw');
  var loginBtn = document.getElementById('login-btn');
  var loginErr = document.getElementById('login-err');
  var msgList = document.getElementById('msg-list');
  var audioPlayer = document.getElementById('audio-player');
  var playerBar = document.getElementById('player-bar');
  var closePlayerBtn = document.getElementById('close-player');
  var refreshBtn = document.getElementById('refresh-btn');
  var cleanupBtn = document.getElementById('cleanup-btn');
  var logoutBtn = document.getElementById('logout-btn');
  var totalCount = document.getElementById('total-count');
  var todayCount = document.getElementById('today-count');
  var storageUsed = document.getElementById('storage-used');
  var privkeyInput = document.getElementById('privkey-input');
  var saveKeyBtn = document.getElementById('save-key-btn');
  var clearKeyBtn = document.getElementById('clear-key-btn');
  var keyStatus = document.getElementById('key-status');
  
  // ===== AUTH =====
  loginBtn.addEventListener('click', doLogin);
  pwInput.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  
  async function doLogin() {
    if (pwInput.value !== VAULT_PASSWORD) {
      loginErr.style.display = 'block';
      pwInput.value = '';
      return;
    }
    loginErr.style.display = 'none';
    
    try {
      var res = await fetch(WORKER_URL + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: VAULT_PASSWORD }),
      });
      var data = await res.json();
      if (data.token) {
        ownerToken = data.token;
        localStorage.setItem('vb_owner_token', data.token);
        showDashboard();
      }
    } catch(e) {
      loginErr.textContent = 'Connection error';
      loginErr.style.display = 'block';
    }
  }
  
  // Auto-login if token saved
  var savedToken = localStorage.getItem('vb_owner_token');
  if (savedToken) {
    ownerToken = savedToken;
    showDashboard();
  }
  
  function showDashboard() {
    loginBox.style.display = 'none';
    dashBox.classList.add('active');
    loadPrivateKey();
    loadMessages();
  }
  
  // ===== PRIVATE KEY =====
  function loadPrivateKey() {
    var saved = localStorage.getItem('vb_private_key');
    if (saved) {
      privateKey = saved;
      privkeyInput.value = saved;
      keyStatus.textContent = 'Private key loaded';
      keyStatus.className = 'key-status ok';
    }
  }
  
  saveKeyBtn.addEventListener('click', function(){
    var val = privkeyInput.value.trim();
    if (!val) return;
    privateKey = val;
    localStorage.setItem('vb_private_key', val);
    keyStatus.textContent = 'Private key saved in browser';
    keyStatus.className = 'key-status ok';
  });
  
  clearKeyBtn.addEventListener('click', function(){
    privateKey = null;
    privkeyInput.value = '';
    localStorage.removeItem('vb_private_key');
    keyStatus.textContent = 'No private key loaded';
    keyStatus.className = 'key-status missing';
  });
  
  // ===== MESSAGES =====
  refreshBtn.addEventListener('click', loadMessages);
  
  async function loadMessages() {
    msgList.innerHTML = '<div class="loading"><div class="spin"></div><p style="margin-top:12px;">Loading...</p></div>';
    
    try {
      var res = await fetch(WORKER_URL + '/messages', {
        headers: { 'X-Owner-Token': ownerToken },
      });
      var data = await res.json();
      messages = data.messages || [];
      updateStats();
      renderMessages();
    } catch(e) {
      msgList.innerHTML = '<div class="empty-state"><p>Failed to load messages</p></div>';
    }
  }
  
  function updateStats() {
    totalCount.textContent = messages.length;
    
    var today = new Date().toISOString().slice(0,10);
    var todayMsgs = messages.filter(function(m){ return m.isoDate && m.isoDate.startsWith(today); });
    todayCount.textContent = todayMsgs.length;
    
    var totalKB = messages.reduce(function(sum, m){ return sum + (m.size || 0); }, 0);
    storageUsed.textContent = Math.round(totalKB / 1024);
  }
  
  function renderMessages() {
    if (messages.length === 0) {
      msgList.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#555c6e" stroke-width="1.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg><p>No voice messages yet</p></div>';
      return;
    }
    
    var html = '';
    for (var i = 0; i < messages.length; i++) {
      var m = messages[i];
      html += '<div class="msg-item" data-key="' + m.key + '">'
        + '<button class="msg-play" data-key="' + m.key + '" aria-label="Play">&#9654;</button>'
        + '<div class="msg-info">'
        + '<div class="msg-sender">' + escapeHtml(m.sender || 'Anonymous') + '</div>'
        + '<div class="msg-meta">' + (m.duration || '0:00') + ' &middot; ' + Math.round((m.size||0)/1024) + ' KB &middot; ' + (m.ext||'webm').toUpperCase() + '</div>'
        + '<div class="msg-date">' + (m.isoDate ? new Date(m.isoDate).toLocaleString() : '') + '</div>'
        + '</div>'
        + '<button class="msg-delete" data-key="' + m.key + '" aria-label="Delete">&#128465;</button>'
        + '</div>';
    }
    msgList.innerHTML = html;
    
    // Attach play/delete listeners
    var playBtns = msgList.querySelectorAll('.msg-play');
    playBtns.forEach(function(btn){ btn.addEventListener('click', playMessage); });
    
    var delBtns = msgList.querySelectorAll('.msg-delete');
    delBtns.forEach(function(btn){ btn.addEventListener('click', deleteMessage); });
  }
  
  // ===== PLAY (Download → Decrypt → Play) =====
  async function playMessage(e) {
    var key = e.currentTarget.dataset.key;
    var btn = e.currentTarget;
    
    if (!privateKey) {
      alert('Please paste your private key first to decrypt messages.');
      return;
    }
    
    btn.textContent = '...';
    btn.disabled = true;
    
    try {
      // Fetch encrypted binary data
      var res = await fetch(WORKER_URL + '/message/' + key, {
        headers: { 'X-Owner-Token': ownerToken },
      });
      
      if (!res.ok) {
        btn.innerHTML = '&#9654;';
        btn.disabled = false;
        alert('Message not found');
        return;
      }
      
      var encryptedBuffer = await res.arrayBuffer();
      
      // Decrypt
      var audioBlob = await decryptAudio(encryptedBuffer);
      
      // Play
      if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
      currentAudioUrl = URL.createObjectURL(audioBlob);
      audioPlayer.src = currentAudioUrl;
      audioPlayer.play();
      playerBar.classList.add('active');
      btn.classList.add('playing');
      
      audioPlayer.onended = function(){ btn.classList.remove('playing'); };
      
      btn.innerHTML = '&#9654;';
      btn.disabled = false;
      
    } catch(err) {
      console.error('Play error:', err);
      btn.innerHTML = '&#9654;';
      btn.disabled = false;
      alert('Decryption failed: ' + err.message);
    }
  }
  
  // ===== DECRYPT =====
  async function decryptAudio(encryptedBuffer) {
    // Parse binary: [IV (12 bytes)] [encrypted AES key length (4 bytes)] [encrypted AES key] [encrypted audio]
    var bytes = new Uint8Array(encryptedBuffer);
    var offset = 0;
    var iv = bytes.slice(offset, offset + 12); offset += 12;
    var encAesLen = new DataView(encryptedBuffer).getUint32(offset); offset += 4;
    var encryptedAesKey = bytes.slice(offset, offset + encAesLen); offset += encAesLen;
    var encryptedAudio = bytes.slice(offset);
    
    // Import private key
    var privateKeyObj = await crypto.subtle.importKey(
      'pkcs8',
      pemToArrayBuffer(privateKey),
      { name: 'RSA-OAEP', hash: 'SHA-256' },
      false,
      ['decrypt']
    );
    
    // Decrypt AES key
    var rawAesKey = await crypto.subtle.decrypt(
      { name: 'RSA-OAEP' },
      privateKeyObj,
      encryptedAesKey
    );
    
    // Import AES key
    var aesKeyObj = await crypto.subtle.importKey(
      'raw',
      rawAesKey,
      { name: 'AES-GCM' },
      false,
      ['decrypt']
    );
    
    // Decrypt audio
    var decryptedBuffer = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv },
      aesKeyObj,
      encryptedAudio
    );
    
    return new Blob([decryptedBuffer], { type: 'audio/webm' });
  }
  
  function pemToArrayBuffer(pem) {
    var b64 = pem.replace(/-----BEGIN.*?-----/g, '').replace(/-----END.*?-----/g, '').replace(/\s/g, '');
    var binaryStr = atob(b64);
    var bytes = new Uint8Array(binaryStr.length);
    for (var i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
    return bytes.buffer;
  }
  
  // ===== DELETE =====
  async function deleteMessage(e) {
    var key = e.currentTarget.dataset.key;
    if (!confirm('Delete this message?')) return;
    
    try {
      await fetch(WORKER_URL + '/message/' + key, {
        method: 'DELETE',
        headers: { 'X-Owner-Token': ownerToken },
      });
      loadMessages();
    } catch(e) {
      alert('Delete failed');
    }
  }
  
  // ===== CLEANUP =====
  cleanupBtn.addEventListener('click', async function(){
    if (!confirm('Delete all messages older than 3 days?')) return;
    try {
      var res = await fetch(WORKER_URL + '/cleanup', {
        method: 'POST',
        headers: { 'X-Owner-Token': ownerToken },
      });
      var data = await res.json();
      alert('Cleaned up ' + data.deleted + ' old messages');
      loadMessages();
    } catch(e) {
      alert('Cleanup failed');
    }
  });
  
  // ===== LOGOUT =====
  logoutBtn.addEventListener('click', function(){
    localStorage.removeItem('vb_owner_token');
    ownerToken = null;
    dashBox.classList.remove('active');
    loginBox.style.display = 'block';
  });
  
  // ===== PLAYER BAR =====
  closePlayerBtn.addEventListener('click', function(){
    audioPlayer.pause();
    playerBar.classList.remove('active');
    if (currentAudioUrl) { URL.revokeObjectURL(currentAudioUrl); currentAudioUrl = null; }
    document.querySelectorAll('.msg-play.playing').forEach(function(b){ b.classList.remove('playing'); });
  });
  
  // ===== HELPERS =====
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  
})();
</script>
</body>
</html>
