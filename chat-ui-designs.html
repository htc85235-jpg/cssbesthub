<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Aspirants Chat — 9 UI Designs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0f14; color: #c9d1e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 6px; color: #e2e8f0; }
  .subtitle { text-align: center; font-size: 13px; color: #555c6e; margin-bottom: 30px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; max-width: 1500px; margin: 0 auto; }
  .card { border-radius: 16px; padding: 16px; background: #12141a; box-shadow: 6px 6px 14px #08090c, -4px -4px 10px #1e2230; }
  .card-label { text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.7; }

  /* Chat mockup base */
  .chat-box { border-radius: 14px; padding: 10px; max-width: 360px; margin: 0 auto; position: relative; display: flex; flex-direction: column; }
  .chat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; padding: 0 2px 4px; }
  .chat-header-left { display: flex; align-items: center; gap: 4px; }
  .chat-timer { font-size: 8px; font-weight: 600; }
  .chat-timer svg { width: 8px; height: 8px; }
  .chat-sync { font-size: 8px; opacity: 0.5; display: flex; align-items: center; gap: 2px; }
  .chat-sync svg { width: 8px; height: 8px; }

  .chat-messages { flex: 1; overflow-y: auto; min-height: 220px; max-height: 220px; padding: 6px 4px; display: flex; flex-direction: column; gap: 6px; }
  .chat-input-row { display: flex; align-items: center; gap: 5px; margin-top: 6px; }

  /* Shared elements */
  .mic-btn { width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .mic-btn svg { width: 15px; height: 15px; }
  .send-btn { width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn svg { width: 14px; height: 14px; }
  .text-input { flex: 1; border: none; border-radius: 8px; padding: 8px 10px; font-size: 12px; outline: none; font-family: inherit; resize: none; min-height: 18px; max-height: 60px; }
</style>
</head>
