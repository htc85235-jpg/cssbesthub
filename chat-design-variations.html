<title>CSS Aspirants Chat — 9 Design Variations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0f14; color: #c9d1e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 6px; color: #e2e8f0; }
  .subtitle { text-align: center; font-size: 13px; color: #555c6e; margin-bottom: 30px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 28px; max-width: 1500px; margin: 0 auto; }
  .card { border-radius: 16px; padding: 16px; position: relative; }
  .card-label { text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.7; }
  .card-sublabel { text-align: center; font-size: 9px; opacity: 0.4; margin-bottom: 14px; font-style: italic; }

  /* Phone frame */
  .phone { width: 280px; margin: 0 auto; border-radius: 18px; overflow: hidden; position: relative; }
  .phone-inner { width: 100%; min-height: 440px; display: flex; flex-direction: column; position: relative; }

  /* Role selection overlay */
  .role-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; gap: 12px; }
  .role-title { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; opacity: 0.8; }
  .role-subtitle { font-size: 9px; opacity: 0.4; margin-top: -6px; margin-bottom: 4px; }
  .role-options { display: flex; gap: 10px; }
  .role-btn { border-radius: 12px; padding: 12px 18px; text-align: center; cursor: pointer; border: none; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; transition: transform 0.15s; }
  .role-btn:hover { transform: scale(1.04); }
  .role-icon { font-size: 22px; margin-bottom: 4px; display: block; }

  /* Chat header */
  .chat-header { display: flex; align-items: center; padding: 8px 10px; gap: 8px; flex-shrink: 0; }
  .chat-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; }
  .chat-info { flex: 1; }
  .chat-name { font-size: 11px; font-weight: 700; }
  .chat-status { font-size: 8px; opacity: 0.5; }
  .chat-timer { font-size: 8px; opacity: 0.6; display: flex; align-items: center; gap: 3px; }
  .chat-timer svg { width: 10px; height: 10px; }

  /* Messages area */
  .chat-messages { flex: 1; padding: 6px 10px; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
  .msg { max-width: 78%; padding: 6px 9px; border-radius: 12px; font-size: 10px; line-height: 1.45; position: relative; }
  .msg-sent { align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg-recv { align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg-time { font-size: 7px; opacity: 0.4; margin-top: 2px; }
  .msg-sent .msg-time { text-align: right; }
  .msg-name { font-size: 7px; font-weight: 700; opacity: 0.5; margin-bottom: 1px; }

  /* Voice message */
  .msg-voice { display: flex; align-items: center; gap: 5px; padding: 6px 9px; }
  .voice-play { width: 20px; height: 20px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 8px; }
  .voice-play svg { width: 10px; height: 10px; }
  .voice-waves { flex: 1; display: flex; align-items: center; gap: 1px; height: 14px; }
  .voice-bar { width: 1.5px; border-radius: 1px; }
  .voice-dur { font-size: 7px; opacity: 0.4; white-space: nowrap; }

  /* Typing indicator */
  .typing { align-self: flex-start; padding: 5px 10px; border-radius: 10px; display: flex; gap: 3px; align-items: center; }
  .typing-dot { width: 4px; height: 4px; border-radius: 50%; animation: typingBounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

  /* Delete notice */
  .delete-notice { text-align: center; font-size: 7px; opacity: 0.3; padding: 2px 0; font-style: italic; }

  /* Input area */
  .chat-input { display: flex; align-items: center; gap: 5px; padding: 6px 8px; flex-shrink: 0; }
  .input-field { flex: 1; border: none; border-radius: 16px; padding: 7px 11px; font-size: 10px; outline: none; font-family: inherit; }
  .input-field::placeholder { opacity: 0.35; }
  .input-mic { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .input-mic svg { width: 13px; height: 13px; }
  .input-send { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .input-send svg { width: 13px; height: 13px; }

  /* Date divider */
  .date-divider { text-align: center; font-size: 7px; opacity: 0.3; padding: 3px 0; position: relative; }
  .date-divider::before, .date-divider::after { content: ''; position: absolute; top: 50%; width: 25%; height: 0.5px; opacity: 0.3; }
  .date-divider::before { left: 5%; }
  .date-divider::after { right: 5%; }

  /* Online dot */
  .online-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-left: 4px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Lock icon for password */
  .lock-icon { width: 24px; height: 24px; opacity: 0.3; margin-bottom: 4px; }
  .lock-icon svg { width: 100%; height: 100%; }

  /* Badge for unread */
  .unread-badge { width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 800; flex-shrink: 0; }

  /* Encrypted tag */
  .enc-tag { font-size: 6px; opacity: 0.3; letter-spacing: 0.5px; margin-top: 1px; }
</style>

          '<div class="role-options">' +
            '<button class="role-btn" style="background:' + d.roleBg1 + ';color:' + d.roleColor1 + ';border:1.5px solid ' + d.roleBorder1 + ';box-shadow:' + neumOut + '">' +
              '<span class="role-icon">' + d.roleIcon1 + '</span>Dumbi' +
            '</button>' +
            '<button class="role-btn" style="background:' + d.roleBg2 + ';color:' + d.roleColor2 + ';border:1.5px solid ' + d.roleBorder2 + ';box-shadow:' + neumOut + '">' +
              '<span class="role-icon">' + d.roleIcon2 + '</span>Dumbo' +
            '</button>' +
          '</div>' +
        '</div>' +

        // Chat header
        '<div class="chat-header" style="background:' + d.headerBg + ';border-bottom:1px solid rgba(255,255,255,0.05)">' +
          '<div class="chat-avatar" style="background:' + d.avatarBg2 + ';color:' + d.avatarText2 + '">D</div>' +
          '<div class="chat-info">' +
            '<div class="chat-name" style="color:' + d.text + '">Dumbo <span class="online-dot" style="background:' + d.onlineColor + '"></span></div>' +
            '<div class="chat-status" style="color:' + d.text + '">Online</div>' +
          '</div>' +
          '<div class="chat-timer" style="color:' + d.timerColor + '">' + clockSvg + ' 23:47:12</div>' +
        '</div>' +

        // Messages
        '<div class="chat-messages" style="background:' + d.bg + '">' +

          // Date divider
          '<div class="date-divider" style="color:' + d.text + '">Today</div>' +

          // Received message
          '<div class="msg msg-recv" style="background:' + d.recvBg + ';color:' + d.recvText + ';box-shadow:' + (d.style === 'neumorphic' ? neumInset : 'none') + '">' +
            '<div class="msg-name" style="color:' + d.accent + '">Dumbo</div>' +
            'Hey! Did you finish the polity chapter?' +
            '<div class="msg-time">3:42 PM</div>' +
            '<div class="enc-tag" style="color:' + d.accent + '">AES-256</div>' +
          '</div>' +

          // Sent message
          '<div class="msg msg-sent" style="background:' + d.sentBg + ';color:' + d.sentText + ';box-shadow:' + (d.style === 'neumorphic' ? neumOut : 'none') + '">' +
            'Almost done! Making notes on DPSP now' +
            '<div class="msg-time">3:44 PM</div>' +
            '<div class="enc-tag" style="color:' + (sentIsGrad ? '#ffffff80' : d.accent) + '">AES-256</div>' +
          '</div>' +

          // Received voice
          '<div class="msg msg-recv msg-voice" style="background:' + d.recvBg + ';color:' + d.recvText + ';box-shadow:' + (d.style === 'neumorphic' ? neumInset : 'none') + '">' +
            '<button class="voice-play" style="background:' + d.voicePlayBg + ';color:' + d.voicePlayColor + '">' + playSvg + '</button>' +
            '<div class="voice-waves">' + voiceBars(d.voiceColor, 20) + '</div>' +
            '<div class="voice-dur" style="color:' + d.text + '">0:42</div>' +
          '</div>' +

          // Sent message
          '<div class="msg msg-sent" style="background:' + d.sentBg + ';color:' + d.sentText + ';box-shadow:' + (d.style === 'neumorphic' ? neumOut : 'none') + '">' +
            'That voice note was super helpful!' +
            '<div class="msg-time">3:48 PM</div>' +
          '</div>' +

          // Typing indicator
          '<div class="typing" style="background:' + d.typingBg + '">' +
            '<div class="typing-dot" style="background:' + d.typingDot + '"></div>' +
            '<div class="typing-dot" style="background:' + d.typingDot + '"></div>' +
            '<div class="typing-dot" style="background:' + d.typingDot + '"></div>' +
          '</div>' +

          // Delete notice
          '<div class="delete-notice" style="color:' + d.text + '">Messages auto-delete in 24h</div>' +

        '</div>' +

        // Input area
        '<div class="chat-input" style="background:' + d.headerBg + ';border-top:1px solid rgba(255,255,255,0.05)">' +
          '<input class="input-field" style="background:' + d.inputBg + ';color:' + d.inputText + ';box-shadow:' + (d.style === 'neumorphic' ? neumInset : 'none') + '" placeholder="Type a message..." readonly>' +
          '<button class="input-mic" style="background:' + d.micBg + ';color:' + d.micColor + ';box-shadow:' + neumOut + '">' + micSvg + '</button>' +
          '<button class="input-send" style="background:' + d.sendBg + ';color:' + d.sendColor + ';box-shadow:' + neumOut + '">' + sendSvg + '</button>' +
        '</div>' +

      '</div>' +
    '</div>';

  grid.appendChild(card);
});
</script>

</body>
</html>
